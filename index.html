<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niels Vermeulen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #374151;
      margin-bottom: 20px;
    }
    h1 {
      margin: 10px 0;
      font-size: 28px;
    }
    p {
      color: #9ca3af;
      margin-bottom: 20px;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .primary {
      background: #2563eb;
      color: white;
    }
    .secondary {
      background: transparent;
      border: 1px solid #374151;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    .box {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
    }
    .box h3 {
      margin: 0 0 5px;
      font-size: 16px;
    }
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Profile" class="avatar" />
    <h1>Niels Vermeulen</h1>
    <p>IT Infrastructure Specialist • Networking • VOIP • Monitoring</p>

    <div class="buttons">
      <button class="btn primary" onclick="window.open('https://www.linkedin.com/in/niels-vermeulen','_blank')">View LinkedIn</button>
      <button class="btn secondary">Contact</button>
    </div>

    <div class="grid">
      <div class="box">
        <h3>Networking</h3>
        <p>Firewalls, switches & access points</p>
      </div>
      <div class="box">
        <h3>Monitoring</h3>
        <p>Zabbix & system health</p>
      </div>
      <div class="box">
        <h3>VOIP</h3>
        <p>3CX telephony solutions</p>
      </div>
    </div>

    <div class="footer">© <span id="year"></span> Niels Vermeulen</div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
